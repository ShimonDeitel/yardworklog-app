name: YardworkLog
options:
  bundleIdPrefix: com.shimondeitel.yardworklog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  YardworkLog:
    type: application
    platform: iOS
    sources:
      - path: YardworkLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.yardworklog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: YardworkLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  YardworkLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: YardworkLogTests
      - path: YardworkLog.storekit
    dependencies:
      - target: YardworkLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.yardworklog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  YardworkLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: YardworkLogUITests
    dependencies:
      - target: YardworkLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.yardworklog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  YardworkLog:
    build:
      targets:
        YardworkLog: all
        YardworkLogTests: [test]
        YardworkLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: YardworkLog.storekit
    test:
      config: Debug
      storeKitConfiguration: YardworkLog.storekit
      targets:
        - YardworkLogTests
        - YardworkLogUITests
    archive:
      config: Release
